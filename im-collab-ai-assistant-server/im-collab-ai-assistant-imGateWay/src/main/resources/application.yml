server:
  port: 8078
imcollab:
  gateway:
    lark:
      app-id: ${LARK_APP_ID:}
      app-secret: ${LARK_APP_SECRET:}
      open-api-base-url: ${LARK_OPEN_API_BASE_URL:https://open.feishu.cn}
    im:
      listener:
        auto-start-enabled: true
      event:
        domain: ${LARK_OPEN_DOMAIN:}
        auto-reconnect-enabled: true
    auth:
      redirect-uri: ${LARK_OAUTH_REDIRECT_URI:http://localhost:8078/api/auth/lark/callback}
      session-ttl: 12h
      jwt-ttl: 2h
      jwt-secret: ${IMCOLLAB_JWT_SECRET:changemechangeme}
      state-ttl: 10m
  store:
    redis:
      host: localhost
      port: 6379
