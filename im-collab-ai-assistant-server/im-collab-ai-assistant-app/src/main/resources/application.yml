server:
  port: ${APP_SERVER_PORT:8078}
  servlet:
    context-path: /api

spring:
  application:
    name: im-collab-ai-assistant-app
  ai:
    model:
      chat: deepseek
    deepseek:
      api-key: ${DEEPSEEK_API_KEY:}
      chat:
        options:
          model: ${DEEPSEEK_MODEL:deepseek-chat}
          temperature: ${DEEPSEEK_TEMPERATURE:0.2}
          max-tokens: ${DEEPSEEK_MAX_TOKENS:4096}

pexels:
  api-key: ${PEXELS_API_KEY:}

imcollab:
  store:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      username: ${REDIS_USERNAME:}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}
      timeout: ${REDIS_TIMEOUT:2s}
    redisson:
      enabled: ${REDISSON_ENABLED:true}
  skills:
    lark-cli:
      executable: ${LARK_CLI_EXECUTABLE:lark-cli}
      args: ${LARK_CLI_ARGS:}
      working-directory: ${LARK_CLI_WORKING_DIR:}
      doc-identity: ${LARK_DOC_IDENTITY:bot}
      timeout-seconds: ${LARK_CLI_TIMEOUT_SECONDS:180}
    lark-doc:
      folder-token: ${LARK_DOC_FOLDER_TOKEN:}
      web-base-url: ${LARK_DOC_WEB_BASE_URL:${LARK_OPEN_DOMAIN:}}
      request-timeout-seconds: ${LARK_DOC_REQUEST_TIMEOUT_SECONDS:30}
      max-blocks-per-request: ${LARK_DOC_MAX_BLOCKS_PER_REQUEST:40}
      max-text-chars-per-block: ${LARK_DOC_MAX_TEXT_CHARS_PER_BLOCK:1600}
  gateway:
    lark:
      app-id: ${LARK_APP_ID:}
      app-secret: ${LARK_APP_SECRET:}
      open-api-base-url: ${LARK_OPEN_API_BASE_URL:}
    im:
      listener:
        auto-start-enabled: ${LARK_IM_LISTENER_AUTO_START:true}
      event:
        domain: ${LARK_OPEN_DOMAIN:}
        auto-reconnect-enabled: ${LARK_IM_AUTO_RECONNECT:true}
    auth:
      # Web 直跳授权地址（302）
      authorize-url: ${LARK_OAUTH_AUTHORIZE_URL:https://accounts.feishu.cn/open-apis/authen/v1/authorize}
      # 二维码嵌入授权地址（QRLogin）
      qr-authorize-url: ${LARK_OAUTH_QR_AUTHORIZE_URL:https://passport.feishu.cn/suite/passport/oauth/authorize}
      # 二维码授权地址中的 client id 参数名
      qr-client-id-param: ${LARK_OAUTH_QR_CLIENT_ID_PARAM:client_id}
      redirect-uri: ${LARK_OAUTH_REDIRECT_URI:http://localhost:5173/auth-callback}
      # 桌面端专用的回调地址
      desktop-redirect-uri: ${LARK_OAUTH_DESKTOP_REDIRECT_URI:http://81.71.143.236:18080/api/auth/lark/desktop-callback}
      session-ttl: ${LARK_AUTH_SESSION_TTL:12h}
      jwt-ttl: ${LARK_AUTH_JWT_TTL:2h}
      jwt-secret: ${IMCOLLAB_JWT_SECRET:change-this-jwt-secret}
      state-ttl: ${LARK_AUTH_STATE_TTL:10m}

planner:
  auth:
    enabled: ${PLANNER_AUTH_ENABLED:true}
  async:
    enabled: ${PLANNER_ASYNC_ENABLED:true}
    core-pool-size: ${PLANNER_ASYNC_CORE_POOL_SIZE:2}
    max-pool-size: ${PLANNER_ASYNC_MAX_POOL_SIZE:4}
    queue-capacity: ${PLANNER_ASYNC_QUEUE_CAPACITY:100}
    task-timeout-seconds: ${PLANNER_ASYNC_TASK_TIMEOUT_SECONDS:180}
  execution:
    core-pool-size: ${PLANNER_EXECUTION_CORE_POOL_SIZE:2}
    max-pool-size: ${PLANNER_EXECUTION_MAX_POOL_SIZE:4}
    queue-capacity: ${PLANNER_EXECUTION_QUEUE_CAPACITY:100}
    timeout-seconds: ${PLANNER_EXECUTION_TIMEOUT_SECONDS:300}
  intent:
    model-enabled: ${PLANNER_INTENT_MODEL_ENABLED:true}
    timeout-seconds: ${PLANNER_INTENT_TIMEOUT_SECONDS:8}
    pass-threshold: ${PLANNER_INTENT_PASS_THRESHOLD:0.65}
    fallback-to-local-rules: ${PLANNER_INTENT_FALLBACK_TO_LOCAL_RULES:true}
    unknown-reply-model-enabled: ${PLANNER_INTENT_UNKNOWN_REPLY_MODEL_ENABLED:true}
    unknown-reply-timeout-seconds: ${PLANNER_INTENT_UNKNOWN_REPLY_TIMEOUT_SECONDS:3}
  prompt:
    profile: ${PLANNER_PROMPT_PROFILE:default}
    version: ${PLANNER_PROMPT_VERSION:v1}
    fallback-profile: ${PLANNER_PROMPT_FALLBACK_PROFILE:default}
    fallback-version: ${PLANNER_PROMPT_FALLBACK_VERSION:v1}
    default-profession: ${PLANNER_DEFAULT_PROFESSION:General Knowledge Worker}
    default-industry: ${PLANNER_DEFAULT_INDUSTRY:General Industry}
    default-audience: ${PLANNER_DEFAULT_AUDIENCE:General Audience}
    default-tone: ${PLANNER_DEFAULT_TONE:Professional, Clear, Actionable}
    default-language: ${PLANNER_DEFAULT_LANGUAGE:zh-CN}
  quality:
    pass-threshold: ${PLANNER_QUALITY_PASS_THRESHOLD:70}
    max-replan-attempts: ${PLANNER_QUALITY_MAX_REPLAN_ATTEMPTS:2}
  summarization:
    max-tokens-before-summary: ${PLANNER_SUMMARY_MAX_TOKENS:6000}
    messages-to-keep: ${PLANNER_SUMMARY_MESSAGES_TO_KEEP:20}

# springdoc-openapi
springdoc:
  group-configs:
    - group: 'planner'
      packages-to-scan: com.lark.imcollab.app.planner.controller

knife4j:
  enable: true

logging:
  level:
    com.lark.imcollab.harness.presentation.service.PresentationWorkflowNodes: DEBUG
    root: INFO
    com.lark.imcollab: INFO
    com.lark.oapi: WARN

presentation:
  debug:
    image-pipeline: true

cos:
  client:
    host: ${COS_HOST:}
    secret-id: ${COS_SECRET_ID:}
    secret-key: ${COS_SECRET_KEY:}
    region: ${COS_REGION:}
    bucket: ${COS_BUCKET:}