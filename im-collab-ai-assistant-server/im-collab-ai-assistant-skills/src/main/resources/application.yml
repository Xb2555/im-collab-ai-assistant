spring:
  application:
    name: im-collab-ai-assistant-skills

imcollab:
  skills:
    lark-cli:
      executable: lark-cli
      working-directory: ""
      authorization-completion-timeout-millis: 10000
      app-id: ${LARK_APP_ID:}
      app-secret: ${LARK_APP_SECRET:}
    lark-sdk:
      app-id: ${LARK_APP_ID:}
      app-secret: ${LARK_APP_SECRET:}
      domain: ${LARK_OPEN_DOMAIN:}
      auto-reconnect-enabled: true
